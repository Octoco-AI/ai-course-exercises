services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-haiku-4-5}
      - MAX_AGENT_TURNS=${MAX_AGENT_TURNS:-20}
    volumes:
      - ./workspace:/app/workspace
      - ./draft-replies:/app/draft-replies
      - ./escalations:/app/escalations
      - ../chroma-corpora/track-b-helpdesk/.chroma:/app/chroma-index:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
