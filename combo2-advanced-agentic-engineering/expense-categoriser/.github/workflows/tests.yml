name: tests

# Unit + API tests run on every push and PR. No external API key required —
# the LLM is mocked. Fast, cheap, green-or-red signal.

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Run unit + API tests
        # -m "not evals" skips the LLM-calling eval suite. Those run in evals.yml.
        run: pytest -v -m "not evals"
